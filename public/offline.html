<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1a1c2e">
    <title>Offline — Gold Security</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1a1c2e;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            text-align: center;
        }
        .box {
            max-width: 360px;
        }
        h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
        p { opacity: .8; font-size: .9rem; margin-bottom: 1.25rem; }
        .btn {
            display: inline-block;
            padding: 0.6rem 1.25rem;
            background: #4e73df;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: .9rem;
        }
        .btn:hover { opacity: .9; color: #fff; }
    </style>
</head>
<body>
    <div class="box">
        <h1>You're offline</h1>
        <p>Check your connection and try again.</p>
        <a href="/" class="btn">Retry</a>
    </div>
</body>
</html>
